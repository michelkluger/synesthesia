name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: synesthesia-windows-x64
          path: target/release/synesthesia.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build aarch64
        # CoreAudio and AVFoundation are universal frameworks, cross-compile works fine
        run: cargo build --release --target aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            -output synesthesia-macos-universal \
            target/aarch64-apple-darwin/release/synesthesia \
            target/x86_64-apple-darwin/release/synesthesia
          chmod +x synesthesia-macos-universal
          zip synesthesia-macos-universal.zip synesthesia-macos-universal
      - uses: actions/upload-artifact@v4
        with:
          name: synesthesia-macos
          path: synesthesia-macos-universal.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libv4l-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev
      - name: Build
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: synesthesia-linux-x64
          path: target/release/synesthesia

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mv synesthesia-windows-x64/synesthesia.exe synesthesia-windows-x64.exe
          mv synesthesia-macos/synesthesia-macos-universal.zip synesthesia-macos-universal.zip
          chmod +x synesthesia-linux-x64/synesthesia
          zip synesthesia-linux-x64.zip synesthesia-linux-x64/synesthesia

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            synesthesia-windows-x64.exe
            synesthesia-macos-universal.zip
            synesthesia-linux-x64.zip
